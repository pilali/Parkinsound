<div class="parkinsound-stepgate-pedal mod-pedal{{{cns}}}">

    <!-- Four explicit drag zones, one in each corner. The 50x50
         corner squares fall outside the ring (corner-to-centre =
         sqrt(75^2+75^2) = 106 > tie outer 95). Anywhere else on the
         pedal stays free for ring and centre-button interaction. -->
    <div mod-role="drag-handle" class="mod-drag-handle drag-zone drag-tl"></div>
    <div mod-role="drag-handle" class="mod-drag-handle drag-zone drag-tr"></div>
    <div mod-role="drag-handle" class="mod-drag-handle drag-zone drag-bl"></div>
    <div mod-role="drag-handle" class="mod-drag-handle drag-zone drag-br"></div>

    <!-- Visible custom UI: tie ring + step ring + four centre quarter
         buttons. Built dynamically by the modgui JS so the geometry
         stays defined in one place. -->
    <svg class="parkinsound-stepgate-svg"
         viewBox="0 0 250 250"
         preserveAspectRatio="xMidYMid meet"
         xmlns="http://www.w3.org/2000/svg">
        <rect class="bg" x="0" y="0" width="250" height="250"></rect>
        <g class="tie-ring"></g>
        <g class="step-ring"></g>
        <g class="centre-halves"></g>
        <g class="centre-labels"></g>
    </svg>

    <!-- Standard mod-ui audio jacks (mustache loop over the LV2 audio
         ports; mod-ui draws the side-view 1/4" plug graphics). -->
    <div class="mod-pedal-input">
        {{#effect.ports.audio.input}}
        <div class="mod-input mod-input-disconnected"
             title="{{name}}"
             mod-role="input-audio-port"
             mod-port-symbol="{{symbol}}">
            <div class="mod-pedal-input-image"></div>
        </div>
        {{/effect.ports.audio.input}}
    </div>
    <div class="mod-pedal-output">
        {{#effect.ports.audio.output}}
        <div class="mod-output mod-output-disconnected"
             title="{{name}}"
             mod-role="output-audio-port"
             mod-port-symbol="{{symbol}}">
            <div class="mod-pedal-output-image"></div>
        </div>
        {{/effect.ports.audio.output}}
    </div>

</div>
